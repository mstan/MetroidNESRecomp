# game.toml — Metroid (NES, Mapper 1 / MMC1, 8 PRG banks)

[game]
output_prefix = "metroid"

# Metroid uses stack-based dispatch patterns that expect JSR return
# addresses on the 6502 stack.  Without this, the NMI handler's
# subroutine calls leave the stack unbalanced.
push_all_jsr = true

# ── Inline dispatch ─────────────────────────────────────────────────────────
# ChooseRoutine at $C27C: PLA-based inline dispatch.
# JSR $C27C is followed by a pointer table; A selects the entry.
[[inline_dispatch]]
addr = 0xC27C

# ── Stack bail functions ────────────────────────────────────────────────────
# $C376 uses PLA PLA + RTS to bail two levels up.
# After calling this, the caller should also return.
[[stack_bail_func]]
addr = 0xC376

# ── Conditional bail functions ─────────────────────────────────────────────
# func_C36B writes to the PPU command buffer. When the buffer is full
# (X >= $4F), it falls through to the $C376 bail code (PLA PLA + RTS),
# bailing two levels up. On normal return (buffer not full), it does a
# regular RTS. The codegen emits an S check at call sites to detect
# which path was taken and propagate the bail.
[[cond_bail_func]]
addr = 0xC36B

# func_EF00 reads (0x00),Y and bails (PLA PLA RTS) when the value is 0xFF.
# Called from func_ED98 (JSR $EF00 at $EDCE) during nametable data parsing.
# Without the S check, the bail over-pops by +2 per invocation.
[[cond_bail_func]]
addr = 0xEF00

# ── Push-JMP targets ───────────────────────────────────────────────────────
# Bail-containing functions reached via JMP need a dummy push so the bail's
# RTS has a safe pop target.  `source` restricts the push to a specific JMP
# site — omit to match all JMP sites targeting that address.
#
# $C328 is only JMP'd from $945C (no JSR return above → needs dummy).
# $C37E is NOT listed: its only JMP site ($8AFC) is always inside a JSR chain
# (JSR $C1E0 → JMP $8AC7 → JMP $C37E), so the bail's RTS correctly pops
# the outer JSR's return address without a dummy push.
[[push_jmp]]
addr = 0xC328
source = 0x945C

# ── Merge ranges ────────────────────────────────────────────────────────────
# EF00-EF8D contains a tile writer with an outer loop (JMP $EF13 at $EF96).
# The function finder discovers many mid-function entry points from dispatch
# tables in various banks.  merge_range automatically merges ALL of them so
# the JMP generates `goto label_EF13` instead of a tail-call that over-pops S.
[[merge_range]]
bank = 7
addr_lo = 0xEF11
addr_hi = 0xEF8D

